name: Phoenix Persistent Autopilot

on:
  schedule:
    - cron: '0 */5 * * *' # Auto-restart every 5 hours
  workflow_dispatch: 

jobs:
  strike:
    strategy:
      fail-fast: false
      matrix:
        machine_id: [1, 2, 3, 4, 5] # 5 Virtual Machines

    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: 🔥 Launch Phoenix Machine ${{ matrix.machine_id }}
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: |
          # Loop to ensure it stays up until GitHub kills the job
          while true; do
            python -u main.py
            echo "♻️ Restarting session..."
            sleep 5
          done
