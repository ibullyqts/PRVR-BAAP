name: Phoenix V100.99 God Mode (Async Strike)

on:
  schedule:
    # 🕒 Rotates every 5 hours for continuous uptime
    - cron: '0 */5 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  async-strike:
    strategy:
      fail-fast: false
      matrix:
        # 🚀 Running 5 virtual machines simultaneously
        machine_id: [1, 2, 3, 4, 5]

    runs-on: ubuntu-latest
    timeout-minutes: 345 # Runs for 5 hours and 45 mins

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Async Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 🔥 Launch Overlord Machine ${{ matrix.machine_id }}
        env:
          # Required GitHub Secrets
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          MACHINE_ID: ${{ matrix.machine_id }}
        run: |
          # 🎲 Random start delay (1-30s) to prevent sync-ban
          sleep $(( ( RANDOM % 30 ) + 1 ))
          
          # 🔄 Infinite loop: Auto-restarts the script if it crashes
          while true; do
            echo "🚀 Machine ${{ matrix.machine_id }} engaging Async Overlord..."
            python -u main.py
            echo "⚠️ Connection dropped or Rate Limited. Rebooting in 10s..."
            sleep 10
          done
