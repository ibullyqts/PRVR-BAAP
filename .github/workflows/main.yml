name: "Hexa-Core Nitro Overdrive"

on:
  workflow_dispatch: # Manual trigger

jobs:
  flood:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This spins up 6 separate virtual machines
        machine_id: [1, 2, 3, 4, 5, 6]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install instagrapi

      - name: Execute Agents
        env:
          # If you have two IDs, Machine 1-3 uses ID_1, 4-6 uses ID_2
          INSTA_COOKIE: ${{ matrix.machine_id <= 3 && secrets.INSTA_COOKIE_1 || secrets.INSTA_COOKIE_2 }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python main.py
