name: Nitro Burst Deploy

on:
  workflow_dispatch: # Allows you to start it manually from the UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install instagrapi

      - name: Execute Hyper-Drive Script
        env:
          # Set these in your GitHub Repo Settings > Secrets and Variables > Actions
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python your_script_name.py
