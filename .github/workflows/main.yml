name: Phoenix V100 Playwright Cluster

on:
  schedule:
    - cron: '0 */6 * * *' # Auto-restart every 6 hours
  workflow_dispatch:

jobs:
  strike:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        machine_id: [1, 2, 3, 4, 5, 6, 7, 8] # 8 Simultaneous Machines
    
    steps:
      - name: 🔱 Checkout
        uses: actions/checkout@v4

      - name: 🔱 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔱 Install Dependencies
        run: |
          pip install playwright playwright-stealth httpx
          playwright install chromium

      - name: 🔱 Purge Ghost Processes
        run: |
          sudo pkill -9 chrome || true
          sudo pkill -9 chromium || true
          rm -rf node_* || true

      - name: 🔱 Ignition ${{ matrix.machine_id }}
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          MACHINE_ID: ${{ matrix.machine_id }}
        run: python bot.py
