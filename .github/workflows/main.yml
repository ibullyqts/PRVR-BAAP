name: "2026 Hexa-Core Overdrive"

on:
  workflow_dispatch:

jobs:
  flood:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6-hour maximum life
    strategy:
      fail-fast: false
      matrix:
        machine_id: [1, 2, 3, 4, 5, 6]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install instagrapi

      - name: Run Overdrive Agent
        env:
          # Split load: Machines 1-3 use Account 1, 4-6 use Account 2
          INSTA_COOKIE: ${{ matrix.machine_id <= 3 && secrets.INSTA_COOKIE_1 || secrets.INSTA_COOKIE_2 }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python main.py
