name: Multi-Account Overdrive

on:
  workflow_dispatch:

jobs:
  burst:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Machine 1 uses Cookie 1, Machine 2 uses Cookie 2
        id: [1, 2]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install instagrapi

      - name: Run Targeted Worker
        env:
          # This logic selects the secret based on the matrix ID
          INSTA_COOKIE: ${{ matrix.id == 1 && secrets.INSTA_COOKIE_1 || secrets.INSTA_COOKIE_2 }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python main.py
